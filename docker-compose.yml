services:
  vault-unseal-key-init:
    image: node:20
    container_name: skeleton-mcp-vault-unseal-key-init
    restart: "no"
    working_dir: /app
    command: sh -c "npm run vault:unseal-key -- --json"
    environment:
      APP_NAME: ${APP_NAME:-skeleton}
      VAULT_UNSEAL_KEY: ${VAULT_UNSEAL_KEY:-}
    volumes:
      - ./:/app

  postgres:
    image: postgres:16
    container_name: skeleton-mcp-postgres
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-skeleton}
      POSTGRES_DB: mcp_config
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: mcp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  vault:
    image: hashicorp/vault:1.18
    container_name: skeleton-mcp-vault
    restart: unless-stopped
    depends_on:
      vault-unseal-key-init:
        condition: service_completed_successfully
    volumes:
      - ./src/config/vault.dev.hcl:/vault/config/vault.hcl:ro
      - vault_dev_raft_data:/vault/data
    ports:
      - "8200:8200"
    environment:
      APP_NAME: ${APP_NAME:-skeleton}
      VAULT_UNSEAL_KEY: ${VAULT_UNSEAL_KEY:-}
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl

  mcp-http:
    image: node:20
    container_name: skeleton-mcp-http
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
      - vault
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mcp_config
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: mcp_password
      APP_NAME: ${APP_NAME:-skeleton}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VAULT_AGENT_ENABLED: "true"
      VAULT_AGENT_AUTH_MODE: both
      VAULT_AGENT_TOKEN_FILE_PATH: /tmp/vault-agent-token
      VAULT_AGENT_LISTENER_ENABLED: "true"
      VAULT_AGENT_LISTENER_ADDR: http://127.0.0.1:8100
      VAULT_KV_MOUNT: secret
      MCP_SERVER_NAME: skeleton-mcp
      MCP_SERVER_VERSION: 0.1.0
      MCP_ALLOW_SENSITIVE_OUTPUT: "false"
      MCP_CONFIG_DEFAULT_USER_ID: default
      MCP_TOKEN_ROTATION_DEFAULT_INTERVAL_MS: 86400000
      MCP_TOKEN_ROTATION_USER_INTERVAL_CONFIG_KEY: token.rotation.intervalMs
      MCP_VAULT_AGENT_AUTH_MODE_CONFIG_KEY: vault.agent.auth.mode
      MCP_VAULT_AGENT_TOKEN_FILE_PATH_CONFIG_KEY: vault.agent.tokenFilePath
      MCP_VAULT_AGENT_LISTENER_ADDR_CONFIG_KEY: vault.agent.listener.addr
      MCP_TRANSPORT_MODE: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      MCP_HTTP_PATH: /mcp
      MCP_HTTP_HEALTH_PATH: /healthz
      MCP_HTTP_AUTH_MODE: token
      MCP_HTTP_TOKEN_SOURCE: vault
      MCP_HTTP_AUTH_TOKENS: replace-me-token
      MCP_HTTP_TRUST_PROXY: "false"
      MCP_HTTP_MAX_BODY_BYTES: 1048576
      MCP_HTTP_RATE_LIMIT_WINDOW_MS: 60000
      MCP_HTTP_RATE_LIMIT_MAX_REQUESTS: 60
    command: sh -c "npm ci && npm run start:http"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app

volumes:
  postgres_data:
  vault_dev_raft_data:
